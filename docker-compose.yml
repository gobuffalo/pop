version: '2.1'

services:
  mysql:
    image: mysql:8.1
    environment:
      - MYSQL_ROOT_PASSWORD=root#
      - MYSQL_DATABASE=pop_test
      - MYSQL_USER=pop
      - MYSQL_PASSWORD=pop#
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 3s

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=pop_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres#
      - POSTGRES_DB=postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "postgres", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 3s

  cockroach:
    image: cockroachdb/cockroach:latest-v25.3
    ports:
      - "26258:26257"
      - "8081:8080"
    #volumes:
      #- ./_vol/cockroach:/cockroach/cockroach-data
    command: start-single-node --insecure
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 3s
